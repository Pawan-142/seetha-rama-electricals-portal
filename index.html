<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seetha Rama Electricals — Inventory &amp; Billing Pro</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Premium Style Sheet -->
  <link rel="stylesheet" href="css/style.css?v=5">
  <style>
    /* Balanced layout overrides for sidebar to optimize space and buttons */
    .sidebar {
      padding-top: 20px !important;
    }
    .sidebar .brand {
      margin-bottom: 28px !important;
      padding: 0 !important;
    }
    .sidebar button.nav-btn {
      padding: 16px 20px !important;
      font-size: 16px !important;
      gap: 16px !important;
    }
    .sidebar .nav-menu {
      gap: 6px !important;
    }
  </style>
</head>

<body>

  <!-- Container for Login Screen (Hydrated dynamically by js/auth.js) -->
  <div id="loginPage"></div>

  <!-- Main SPA Container (Hidden by default, displayed on successful authentication) -->
  <div id="app" style="display: none;">
    <!-- Sidebar Navigation (Premium Slate Dark Theme) -->
    <aside class="sidebar">
      <div class="brand" style="justify-content: flex-start; position: relative;">
        <div class="brand-logo-custom" style="width: 220px; height: auto; background: transparent; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-top: 12px; margin-bottom: 6px; margin-left: -24px;"><img src="assets/logo.png" alt="SRE Logo" style="width: 100%; height: auto; object-fit: contain;"></div>
        <button class="menu-toggle-btn" onclick="toggleMobileMenu()" aria-label="Toggle Navigation Menu" style="position: absolute; right: 10px; top: 20px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
      <nav class="nav-menu">
        <button class="nav-btn" id="navDashboard" onclick="loadDashboard()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-btn" id="navInventory" onclick="loadInventory()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
          <span>Inventory</span>
        </button>
        <button class="nav-btn" id="navCustomers" onclick="loadCustomers()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          <span>Customers</span>
        </button>
        <button class="nav-btn" id="navInvoice" onclick="loadInvoice()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          <span>Create Invoice</span>
        </button>
        <button class="nav-btn" id="navSales" onclick="loadSales()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
          <span>Sales Registry</span>
        </button>
        <button class="nav-btn" id="navUsers" onclick="loadUsers()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>
          <span>User Accounts</span>
        </button>
      </nav>
      <div class="nav-footer">
        <!-- Profile info injected here dynamically by configureUIForRole() -->
        <!-- OPTION 2: Bottom of Sidebar Theme Toggle -->
        <button class="nav-btn theme-toggle-btn" onclick="toggleTheme()" style="margin-top: 10px; border-color: rgba(255, 255, 255, 0.08);">
          <svg class="themeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none; width:20px; height:20px;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.77" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px; height:20px;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span class="themeText">Dark Mode</span>
        </button>
        <button class="nav-btn logout-btn" onclick="logout()" style="color: var(--danger); border-color: rgba(239, 68, 68, 0.15); margin-top: 10px;">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main Dynamic Content Shell -->
    <main style="position: relative;">
      <section id="dashboard" style="display: none;"></section>
      <section id="inventory" style="display: none;"></section>
      <section id="customers" style="display: none;"></section>
      <section id="invoice" style="display: none;"></section>
      <section id="sales" style="display: none;"></section>
      <section id="users" style="display: none;"></section>
    </main>
  </div>

  <!-- Invoice Print/PDF Preview Container -->
  <div id="invoiceContainer" style="display: none;">
    <div class="invoice-actions-top">
      <button class="btn btn-outline" id="btnInvoiceBack" onclick="closeInvoicePreview()">← Back</button>
      <button class="btn btn-primary" onclick="downloadPDF()">Download PDF</button>
      <button class="btn btn-success" onclick="printInvoiceAsPDF()">Print Invoice</button>
    </div>
    <div id="invoicePages"></div>
  </div>

  <!-- overlay Modals -->
  <!-- Product Insertion / Modification Modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Add New Product</h3>
        <button class="modal-close" onclick="closeProductModal()">✕</button>
      </div>
      <form onsubmit="saveProductModal(event)" id="productForm">
        <div class="modal-body">
          <div class="field-group">
            <label for="p_name">Product Name *</label>
            <input type="text" id="p_name" class="form-control" required placeholder="Enter product name">
          </div>
          <div class="field-group">
            <label for="p_category">Category *</label>
            <select id="p_category" class="form-control" required>
              <option value="">Select Category</option>
              <option value="Electrical">Electrical</option>
              <option value="Plumbing">Plumbing</option>
              <option value="Hardware">Hardware</option>
              <option value="Lighting">Lighting</option>
            </select>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="field-group">
              <label for="p_unit">Unit of Measure *</label>
              <select id="p_unit" class="form-control" required>
                <option value="Nos">Nos</option>
                <option value="Mtrs">Mtrs</option>
                <option value="Sets">Sets</option>
                <option value="Boxes">Boxes</option>
                <option value="Kgs">Kgs</option>
              </select>
            </div>
            <div class="field-group">
              <label for="p_stock">Initial Stock *</label>
              <input type="number" id="p_stock" class="form-control" required min="0" value="0">
            </div>
          </div>
          <div class="field-group">
            <label for="p_rate">Base Rate (Excl. Tax) *</label>
            <input type="number" id="p_rate" class="form-control" required min="0" step="0.01" placeholder="0.00">
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="field-group">
              <label for="p_cgst">CGST % *</label>
              <input type="number" id="p_cgst" class="form-control" required min="0" max="100" step="0.1" value="9">
            </div>
            <div class="field-group">
              <label for="p_sgst">SGST % *</label>
              <input type="number" id="p_sgst" class="form-control" required min="0" max="100" step="0.1" value="9">
            </div>
          </div>
          <div class="field-group">
            <label for="p_minStock">Low Stock Alert Limit *</label>
            <input type="number" id="p_minStock" class="form-control" required min="1" value="10">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeProductModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Customer Insertion / Modification Modal -->
  <div class="modal-overlay" id="customerModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Add New Customer</h3>
        <button class="modal-close" onclick="closeCustomerModal()">✕</button>
      </div>
      <form onsubmit="saveCustomerModal(event)" id="customerForm">
        <div class="modal-body">
          <div class="field-group">
            <label for="c_name">Customer Name *</label>
            <input type="text" id="c_name" class="form-control" required placeholder="Enter customer name">
          </div>
          <div class="field-group">
            <label for="c_phone">Phone Number *</label>
            <input type="tel" id="c_phone" class="form-control" required placeholder="Enter 10-digit phone number" pattern="[0-9]{10}">
          </div>
          <div class="field-group">
            <label for="c_email">Email Address</label>
            <input type="email" id="c_email" class="form-control" placeholder="Enter email address (optional)">
          </div>
          <div class="field-group">
            <label for="c_address">Billing Address</label>
            <textarea id="c_address" class="form-control" rows="3" placeholder="Enter billing address (optional)"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeCustomerModal()">Cancel</button>
          <button type="submit" class="btn btn-success">Save Customer</button>
        </div>
      </form>
    </div>
  </div>

  <!-- User Creation / Modification Modal -->
  <div class="modal-overlay" id="userModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Add New Staff Member</h3>
        <button class="modal-close" onclick="closeUserModal()">✕</button>
      </div>
      <form onsubmit="saveUserModal(event)" id="userForm">
        <div class="modal-body">
          <div class="field-group">
            <label for="u_name">Full Name *</label>
            <input type="text" id="u_name" class="form-control" required placeholder="Enter full name">
          </div>
          <div class="field-group">
            <label for="u_username">Username *</label>
            <input type="text" id="u_username" class="form-control" required placeholder="Enter username">
          </div>
          <div class="field-group">
            <label for="u_role">Role *</label>
            <select id="u_role" class="form-control" required>
              <option value="staff">Staff</option>
              <option value="admin">Administrator</option>
            </select>
          </div>
          <div class="field-group">
            <label for="u_password">Password *</label>
            <div class="password-wrapper">
              <input type="password" id="u_password" class="form-control" required placeholder="••••••••">
              <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('u_password', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeUserModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Profile</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div class="modal-overlay" id="changePasswordModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Change Account Password</h3>
        <button class="modal-close" onclick="closeChangePasswordModal()">✕</button>
      </div>
      <form onsubmit="saveChangePasswordModal(event)" id="changePasswordForm">
        <div class="modal-body">
          <div class="field-group">
            <label for="cp_current">Current Password *</label>
            <div class="password-wrapper">
              <input type="password" id="cp_current" class="form-control" required placeholder="Enter current password">
              <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('cp_current', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="field-group">
            <label for="cp_new">New Password *</label>
            <div class="password-wrapper">
              <input type="password" id="cp_new" class="form-control" required placeholder="Enter new password (min. 6 chars)" minlength="6">
              <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('cp_new', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="field-group">
            <label for="cp_confirm">Confirm New Password *</label>
            <div class="password-wrapper">
              <input type="password" id="cp_confirm" class="form-control" required placeholder="Re-enter new password">
              <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('cp_confirm', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeChangePasswordModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Update Password</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Core JavaScript Libraries -->
  <!-- Chart.js for reports/charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- html2canvas and jsPDF for PDF billing functionality -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- SPA Module Script Dependencies -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/customer.js"></script>
  <script src="js/invoice.js"></script>
  <script src="js/sales.js"></script>
  <script src="js/users.js"></script>
  <!-- SPA Main Entry point -->
  <script src="js/app.js"></script>

</body>

</html>
